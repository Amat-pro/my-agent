services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-agent:local
    ports:
      - "8000:8000"
    environment:
      APP_NAME: my-agent
      APP_ENV: local
      APP_DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/my_agent
      REDIS_URL: redis://redis:6379/0
      DEFAULT_MODEL_PROVIDER: openai
      DEFAULT_MODEL_NAME: gpt-4.1-mini
      MAX_AGENT_STEPS: "8"
      REQUEST_TIMEOUT_SECONDS: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: my_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /app/data/postgres
    ports:
      - "5432:5432"
    volumes:
      - ${PROJECT_DIR:-.}/data/postgres:/app/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_agent"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--dir", "/app/data/redis"]
    ports:
      - "6379:6379"
    volumes:
      - ${PROJECT_DIR:-.}/data/redis:/app/data/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
